<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#1f4f4f">
    <title>Agenda Sacramental</title>
    <link rel="icon" type="image/webp" href="./assets/app-icon.webp">
    <link rel="shortcut icon" type="image/webp" href="./assets/app-icon.webp">
    <link rel="apple-touch-icon" href="./assets/app-icon.webp">
    <link rel="stylesheet" href="./styles.css?v=20260519-2">
  </head>
  <body>
    <div id="app" class="app-shell setup-mode">
      <aside class="sidebar" aria-label="Navegación principal">
        <button id="brand-home" class="brand-block brand-link" type="button" aria-label="Ir al inicio">
          <img class="brand-mark" src="./assets/app-icon.webp" alt="" aria-hidden="true">
          <div>
            <p class="eyebrow">Agenda</p>
            <h1>Sacramental</h1>
          </div>
        </button>

        <div id="session-chip" class="session-chip skeleton">Conectando...</div>

        <nav class="nav-list">
          <button class="nav-item active" data-route="agendas" type="button">Agendas</button>
          <button class="nav-item" data-route="planning" type="button">Planificación</button>
          <button class="nav-item" data-route="settings" type="button">Ajustes</button>
        </nav>
      </aside>

      <section class="workspace" aria-live="polite">
        <header class="topbar">
          <div>
            <p id="topbar-eyebrow" class="eyebrow">Unidad</p>
            <h2 id="topbar-title">Agenda Sacramental</h2>
          </div>
          <div class="topbar-actions">
            <button id="change-unit" class="chip-button" type="button">Cambiar unidad</button>
            <button id="sign-out" class="chip-button danger-chip" type="button">Salir</button>
          </div>
        </header>

        <main id="screen" class="screen">
          <div class="loading-panel">
            <div class="spinner"></div>
            <span>Cargando...</span>
          </div>
        </main>
      </section>
    </div>

    <dialog id="modal" class="modal"></dialog>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="./hymns.js?v=20260519-2"></script>
    <script type="module" src="./app.js?v=20260519-2"></script>
  </body>
</html>
